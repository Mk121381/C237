<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Counter App</h1>
    <p id="number">0</p>

    
    <script>
        let num = 0
        function plus() {
            num = num + 1
            document.getElementById("number").innerText = num
        }
        
        function minus() {
            num = num - 1
            document.getElementById("number").innerText = num
        }

    </script>

    <button onclick="plus()"> + </button>    
    <button onclick="minus()"> - </button>

</body>
</html>
